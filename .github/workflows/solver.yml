name: Turnstile Solver Scraper

on:
  workflow_dispatch:
  push:
    paths:
      - 'config.js'      
      - 'solver.js'      
      - 'solver-cli.js'
      - 'package.json'

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run solver
        run: xvfb-run --auto-servernum node solver-cli.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            results_*.json
            solver.log
          retention-days: 30

      - name: Show summary
        if: always()
        run: |
          echo "=== Results ==="
          ls -la results_*.json solver.log 2>/dev/null || echo "No files"
          echo ""
          echo "=== Last 10 lines of log ==="
          tail -n 10 solver.log 2>/dev/null || echo "No log"