name: Turnstile Solver Scraper

on:
  workflow_dispatch:
  push:
    paths:
      - 'config.js'      
      - 'solver.js'      
      - 'solver-cli.js'
      - 'package.json'

jobs:
  scrape-with-sitekey:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'sitekey') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install System Dependencies & Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Jalankan Solver (dengan sitekey)
        run: xvfb-run --auto-servernum node solver-cli.js
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
          SOLVER_MODE: sitekey

      - name: Upload hasil
        uses: actions/upload-artifact@v4
        with:
          name: hasil-sitekey
          path: |
            results_*.json
            solver.log
          retention-days: 30

  scrape-without-sitekey:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'url') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install System Dependencies & Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Jalankan Solver (tanpa sitekey)
        run: xvfb-run --auto-servernum node solver-cli.js
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
          SOLVER_MODE: url

      - name: Upload hasil
        uses: actions/upload-artifact@v4
        with:
          name: hasil-url
          path: |
            results_*.json
            solver.log
          retention-days: 30