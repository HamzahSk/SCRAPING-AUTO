name: Playwright Web Scraper

# Trigger workflow: 
# 1. Bisa jalan manual (workflow_dispatch)
# 2. Jalan otomatis (push) KALAU config.js atau package.json berubah
on:
  workflow_dispatch:
  push:
    paths:
      - 'config.js'      
      - 'custom/**'      
      - 'package.json'

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' 

      - name: Install dependencies
        run: npm install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/msplaywright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # =========================================================
      # ✨ TAMBAHAN BARU: Install Xvfb (Layar Virtual)
      # =========================================================
      - name: Install Xvfb (Virtual Display)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # =========================================================
      # ✨ TAMBAHAN BARU: Jalankan script dibungkus dengan xvfb-run
      # =========================================================
      - name: Jalankan Script Scraping
        run: xvfb-run --auto-servernum npm run scrape

      - name: Upload hasil scrape sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-hasil-scrape
          path: results/
