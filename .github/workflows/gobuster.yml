name: Gobuster Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Masukkan URL Target (contoh: https://example.com)'
        required: true
        type: string
      wordlist_url:
        description: 'URL Wordlist (Opsional, default pake SecLists common.txt)'
        required: false
        default: 'https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/common.txt'
        type: string

jobs:
  gobuster-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Install Gobuster
      run: |
        go install github.com/OJ/gobuster/v3@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Download Wordlist
      run: |
        echo "Mengunduh wordlist..."
        curl -sL "${{ github.event.inputs.wordlist_url }}" -o wordlist.txt
        echo "Wordlist siap dengan $(wc -l < wordlist.txt) baris."

    - name: Run Gobuster
      run: |
        echo "Memulai scanning ke: ${{ github.event.inputs.target_url }}"
        # Menjalankan gobuster mode dir, -k untuk skip sertifikat SSL jika tidak valid
        gobuster dir -u "${{ github.event.inputs.target_url }}" -w wordlist.txt -k -o gobuster-result.txt
      continue-on-error: true

    - name: Upload Result to Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gobuster-scan-report
        path: gobuster-result.txt
        retention-days: 5
