name: Gobuster Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL (contoh: https://example.com)"
        required: true
        type: string

      wordlist_url:
        description: "Wordlist URL (Opsional)"
        required: false
        default: "https://raw.githubusercontent.com/matteo741/Gobuster/main/wordlist.txt"
        type: string

jobs:
  gobuster:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Gobuster
        run: |
          go install github.com/OJ/gobuster/v3@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Download Wordlist
        run: |
          echo "Downloading wordlist..."
          curl -fsSL "${{ github.event.inputs.wordlist_url }}" -o wordlist.txt

          if [ ! -s wordlist.txt ]; then
            echo "Wordlist kosong atau gagal diunduh."
            exit 1
          fi

          echo "Jumlah entri:"
          wc -l wordlist.txt

      - name: Run Gobuster
        continue-on-error: true
        run: |
          echo "Target: ${{ github.event.inputs.target_url }}"

          gobuster dir \
            -u "${{ github.event.inputs.target_url }}" \
            -w wordlist.txt \
            -k \
            -t 20 \
            --timeout 10s \
            --no-error \
            -o gobuster-result.txt \
            | tee gobuster-console.log

      - name: Show Summary
        if: always()
        run: |
          echo "===== Ringkasan ====="

          if [ -f gobuster-result.txt ]; then
            echo "Jumlah hasil:"
            wc -l gobuster-result.txt
          else
            echo "Tidak ada file hasil."
          fi

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gobuster-report
          path: |
            gobuster-result.txt
            gobuster-console.log
            wordlist.txt
          retention-days: 7